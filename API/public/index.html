<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HAZE</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-brand">HAZE</div>
      <div class="topbar-center">analisis adversarial de artefactos</div>
      <div class="topbar-status" id="topbar-status">inactivo</div>
    </header>

    <main class="layout">

      <section class="panel setup" id="setup">
        <div class="panel-titlebar">-- artefacto --</div>
        <div class="panel-body">

          <label class="field">
            <span class="field-label">nombre del archivo</span>
            <input id="filename" type="text" placeholder="installer.py" />
          </label>

          <div class="field">
            <div class="file-row">
              <span class="field-label">contenido</span>
              <label class="upload-btn">
                [subir archivo]
                <input id="fileInput" type="file" hidden />
              </label>
            </div>
            <textarea
              id="artifact"
              rows="12"
              placeholder="# pega el codigo, la dependencia o la documentacion a analizar"
            ></textarea>
            <small id="artifactMeta" class="muted"></small>
          </div>

          <div class="section-sep">-- jurado --</div>

          <label class="field">
            <span class="field-label">rondas de debate: <span id="roundsLabel" class="accent">2</span></span>
            <input id="rounds" type="range" min="1" max="4" value="2" />
          </label>

          <div id="roleConfig" class="role-config"></div>

          <button id="startBtn" class="cta">$ iniciar analisis</button>
          <p id="status" class="status"></p>

        </div>
      </section>

      <section class="panel courtroom">
        <div class="panel-titlebar">-- sala --</div>
        <div id="verdict" class="verdict hidden"></div>
        <div class="arena">
          <div class="column col-acu">
            <div class="col-head t-acu">[ acusacion ]</div>
            <div id="lane-acusacion" class="lane"></div>
          </div>
          <div class="column col-def">
            <div class="col-head t-def">[ defensa ]</div>
            <div id="lane-defensa" class="lane"></div>
          </div>
        </div>
        <div id="emptyState" class="empty-state">
          sala vacia &mdash; configura el caso y ejecuta <span class="accent">$ iniciar analisis</span>
        </div>
      </section>

    </main>

    <script src="app.js"></script>
  </body>
</html>
